<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            border-radius: 12px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #38bdf8;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<h1>📊 Property Dashboard</h1>

<form method="POST">
    <input type="number" name="bedrooms" value="{{ bedrooms }}">
    <button type="submit">Update</button>
</form>

<div class="card">
    <h3>Bedrooms vs Price</h3>
    {{ bar | safe }}
</div>

<div class="card">
    <h3>Area vs Price</h3>
    {{ scatter | safe }}
</div>

<div class="card">
    <h3>Bathrooms vs Price</h3>
    {{ scatter2 | safe }}
</div>

<a href="/">⬅ Back</a>

</body>
</html>
