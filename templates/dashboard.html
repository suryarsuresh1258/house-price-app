<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            margin: 0;
        }

        .card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            border-radius: 12px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #38bdf8;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>📊 Property Dashboard</h1>

<form method="POST">
    <input type="number" name="bedrooms" value="{{ bedrooms }}">
    <button type="submit">Update</button>
</form>

<div class="card">
    <h3>Bedrooms vs Price</h3>
    <div id="bar"></div>
</div>

<div class="card">
    <h3>Price Trend</h3>
    <div id="scatter"></div>
</div>

<div class="card">
    <h3>Price Distribution</h3>
    <div id="hist"></div>
</div>

<script>
    var data = {{ graph_data | safe }};

    Plotly.newPlot('bar', [data.bar]);
    Plotly.newPlot('scatter', [data.scatter]);
    Plotly.newPlot('hist', [data.hist]);
</script>

<br>
<a href="/">⬅ Back to Home</a>

</body>
</html>
