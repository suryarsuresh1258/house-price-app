<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        input {
            width: 92%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 96%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            background: #d4edda;
            color: #155724;
            border-radius: 6px;
            font-weight: bold;
        }

        .confidence {
            margin-top: 10px;
            padding: 10px;
            background: #fff3cd;
            color: #856404;
            border-radius: 6px;
            font-size: 14px;
        }

        img {
            margin-top: 15px;
            width: 100%;
            border-radius: 8px;
        }

        .footer {
            margin-top: 12px;
            font-size: 12px;
            color: #777;
        }

        .link {
            margin-top: 12px;
            display: block;
            color: #4facfe;
            text-decoration: none;
            font-weight: bold;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🏠 House Price Prediction</h2>

        <form action="/predict" method="POST">
            <input type="number" name="bedroomcnt" placeholder="Bedrooms" step="1" required>
            <input type="number" name="bathroomcnt" placeholder="Bathrooms" step="0.5" required>
            <input type="number" name="calculatedfinishedsquarefeet" placeholder="Area (sqft)" step="50" required>
            <input type="number" name="garagecarcnt" placeholder="Garage Cars" step="1" required>
            <input type="number" name="yearbuilt" placeholder="Year Built" step="1" required>

            <button type="submit">Predict Price</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}

        {% if confidence_text %}
        <div class="confidence">
            {{ confidence_text }}
        </div>
        {% endif %}

        {% if plot_url %}
        <img src="{{ url_for('static', filename=plot_url) }}" alt="Feature Importance">
        {% endif %}

        <a href="/dashboard" class="link">📊 Go to Dashboard</a>

        <div class="footer">
            Zillow ML Project 🚀
        </div>
    </div>
</body>
</html>
