<!DOCTYPE html>
<html>
<head>
    <title>Zillow House Price Prediction</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 95%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }

        img {
            margin-top: 15px;
            border-radius: 8px;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🏡 Zillow House Price Prediction</h2>

    <form action="/predict" method="POST">

        <input type="number" name="calculatedfinishedsquarefeet" placeholder="Area (sq ft)" required>
        <input type="number" name="bedroomcnt" placeholder="Bedrooms" required>
        <input type="number" name="bathroomcnt" placeholder="Bathrooms" required>
        <input type="number" name="garagecarcnt" placeholder="Garage" required>
        <input type="number" name="yearbuilt" placeholder="Year Built" required>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
        <div class="result">
            <h3>{{ prediction_text }}</h3>
        </div>
    {% endif %}

    {% if confidence_text %}
        <p>{{ confidence_text }}</p>
    {% endif %}

    {% if plot_url %}
        <img src="data:image/png;base64,{{ plot_url }}">
    {% endif %}

    <a href="/dashboard">📊 Go to Dashboard</a>

</div>

</body>
</html>
