<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        h2 {
            margin-bottom: 10px;
        }

        a {
            display: block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🏡 House Price Prediction</h2>

    <form action="/predict" method="POST">

        <input type="number" step="any" name="calculatedfinishedsquarefeet" placeholder="Area" required>
        <input type="number" step="any" name="bedroomcnt" placeholder="Bedrooms" required>
        <input type="number" step="any" name="bathroomcnt" placeholder="Bathrooms" required>
        <input type="number" step="any" name="garagecarcnt" placeholder="Garage Cars" required>
        <input type="number" step="any" name="yearbuilt" placeholder="Year Built" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}

    {% if confidence_text %}
        <p>{{ confidence_text }}</p>
    {% endif %}

    {% if plot_html %}
        <div>
            {{ plot_html | safe }}
        </div>
    {% endif %}

    <a href="/dashboard">📊 Go to Dashboard</a>
</div>

</body>
</html>
